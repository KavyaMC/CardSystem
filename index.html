<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<title>Interactive Cart UI</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
	</head>

	<body>
		<div class="container py-5">
			<header class="mb-5 text-center">
				<h1>Fresh Foods Market</h1>
				<p class="fs-5 fw-bold">
					Current Total: ₹<span id="cart-total">0</span>
				</p>p>

				<p id="update" aria-live="polite" class="visually-hidden"></p>
			</header>

			<main>
				<section id="store-shelf" class="card mb-4">
					<div class="card-body">
						<h2>Available Products</h2>
						<!-- Data attributes safely store exact data to extract later -->
						<button type="button" class="btn btn-primary product-btn w-100 mb-2" data-name="Mango Juice" data-price="105">Mango Juice - ₹105</button>
						<button type="button" class="btn btn-primary product-btn w-100 mb-2" data-name="Roti Pack" data-price="85">Roti Pack - ₹85</button>
						<button type="button" class="btn btn-primary product-btn w-100 mb-2" data-name="Kurta" data-price="200">Kurta - ₹200</button>
					</div>
				</section>

				<section id="shopping-cart" class="card mb-4">
					<div class="card-body">
						<h2>Your Cart</h2>
						<ul id="cart-list" class="list-group">
							<!-- Items will be injected here dynamically -->
						</ul>
					</div>
				</section>

				<section id="checkout-section" class="card mb-4">
					<div class="card-body">
						<h2>Checkout</h2>
						<form id="checkout-form">
							<label for="promo-code">Promo Code:</label>
							<input class="form-control" type="text" id="promo-code">
							<span id="promo-message" class="text-primary"></span>
							<br />
							<button class="btn btn-success" type="submit" id="submit-btn">Finalize Purchase</button>
						</form>
						<p id="checkout-status" class="mt-3 fw-semibold" aria-live="polite"></p>
					</div>
				</section>
			</main>
			<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
			<script src="script.js"></script>
		</div>
	</body>

</html>
