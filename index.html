<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<title>Interactive Cart UI</title>
	</head>

	<body>
		<header>
			<h1>Fresh Foods Market</h1>
			<p>
				Current Total: ₹<span id="cart-total">0</span>

			<p id="update" aria-live="polite" class="visually-hidden"></p>
		</header>

		<main>
			<section id="store-shelf">
				<h2>Available Products</h2>
				<!-- Data attributes safely store exact data to extract later -->
				<button type="button" class="product-btn" data-name="Mango Juice" data-price="105">Mango Juice - ₹105</button><br />
				<button type="button" class="product-btn" data-name="Roti Pack" data-price="85">Roti Pack - ₹85</button><br />
				<button type="button" class="product-btn" data-name="Kurta" data-price="200">Kurta - ₹200</button>
			</section>

			<section id="shopping-cart">
				<h2>Your Cart</h2>
				<ul id="cart-list">
					<!-- Items will be injected here dynamically -->
				</ul>
			</section>

			<section id="checkout-section">
				<h2>Checkout</h2>
				<form id="checkout-form">
					<label for="promo-code">Promo Code:</label>
					<input type="text" id="promo-code">
					<span id="promo-message"></span>
					<br />
					<button type="submit" id="submit-btn">Finalize Purchase</button>
				</form>
				<p id="checkout-status" aria-live="polite"></p>
			</section>
		</main>
		<script src="script.js"></script>
	</body>

</html>
